<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>B.B. カード</title>
<style>
  :root{
    --accent:#e0457b;
    --bg:#f4f6fb;
    --card-bg:#ffffff;
    --ink:#1f2933;
    --muted:#7b8794;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;}

  /* ---------- Home (set chooser) ---------- */
  #home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:28px;overflow-y:auto;}
  #home h1{font-size:clamp(28px,6vw,44px);margin:0;letter-spacing:.04em;}
  #home p.sub{margin:0;color:var(--muted);font-size:15px;text-align:center;line-height:1.7;}
  .set-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;width:100%;max-width:460px;}
  .set-btn{
    aspect-ratio:1/1;border-radius:24px;background:var(--card-bg);
    box-shadow:0 6px 20px rgba(0,0,0,.08);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;font-weight:700;
  }
  .set-btn:active{transform:scale(.96);box-shadow:0 3px 10px rgba(0,0,0,.12);}
  .set-btn .mk{font-size:clamp(48px,14vw,76px);line-height:1;}
  .set-btn .nm{font-size:15px;color:var(--muted);}

  /* ---------- Player ---------- */
  #player{flex:1;min-height:0;display:none;flex-direction:column;overflow:hidden;}
  .topbar{
    display:flex;align-items:center;gap:10px;padding:10px 14px;flex:none;
    background:var(--accent);color:#fff;
  }
  .topbar .back{font-size:22px;color:#fff;padding:4px 8px;border-radius:10px;}
  .topbar .back:active{background:rgba(255,255,255,.2);}
  .topbar .title{font-weight:700;font-size:16px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .topbar .rangebtn{
    font-weight:800;font-size:14px;background:#fff;color:var(--accent);
    padding:8px 14px;border-radius:999px;white-space:nowrap;flex:none;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  .topbar .rangebtn:active{transform:scale(.95);}
  .topbar .rangebtn.pulse{animation:rb 1.5s ease-in-out 0.4s 4;}
  @keyframes rb{
    0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.7);}
    50%{box-shadow:0 0 0 7px rgba(255,255,255,0);transform:scale(1.05);}
  }
  .topbar .count{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;background:rgba(255,255,255,.22);padding:6px 11px;border-radius:999px;white-space:nowrap;flex:none;}

  .stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:12px;}
  .card{
    background:var(--card-bg);border-radius:24px;box-shadow:0 10px 34px rgba(0,0,0,.10);
    width:100%;max-width:680px;height:100%;min-height:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:34px 22px 16px;gap:12px;text-align:center;position:relative;
    border-top:8px solid var(--accent);
  }
  .card .badge{
    position:absolute;top:12px;left:18px;font-size:26px;font-weight:800;color:var(--accent);opacity:.85;z-index:1;
  }
  .card .pic{
    flex:1 1 auto;min-height:0;max-height:100%;max-width:100%;width:auto;
    object-fit:contain;border-radius:14px;background:#fff;
  }
  .card .en{font-size:clamp(22px,4.6vw,36px);font-weight:700;line-height:1.35;flex:none;}
  .card .jp{font-size:clamp(14px,3.2vw,19px);color:var(--muted);line-height:1.6;flex:none;}
  /* answer-hidden (picture-only) mode */
  .card.hide-answer .en, .card.hide-answer .jp{display:none;}

  .controls{padding:8px 14px max(10px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:10px;flex:none;}
  .play-row{display:flex;align-items:center;justify-content:center;gap:clamp(18px,6vw,26px);width:100%;max-width:520px;}
  .nav{
    width:clamp(48px,13vw,60px);height:clamp(48px,13vw,60px);border-radius:50%;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.10);
    font-size:24px;color:var(--ink);display:flex;align-items:center;justify-content:center;
    transition:transform .1s;
  }
  .nav:active{transform:scale(.92);}
  .nav:disabled{opacity:.3;}
  .play{
    width:clamp(64px,18vw,88px);height:clamp(64px,18vw,88px);border-radius:50%;background:var(--accent);color:#fff;
    font-size:clamp(30px,8vw,40px);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(224,69,123,.45);transition:transform .1s;
  }
  .play:active{transform:scale(.93);}
  .opts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .chip{
    font-size:13px;font-weight:600;color:var(--muted);background:#fff;
    border:2px solid #e3e8ef;border-radius:999px;padding:7px 14px;display:flex;align-items:center;gap:6px;
  }
  .chip.on{color:#fff;background:var(--accent);border-color:var(--accent);}
  .speed-chip{cursor:pointer;}

  /* range picker in grid sheet */
  .range-row{
    display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
    margin-bottom:16px;font-size:14px;color:var(--ink);
  }
  .range-row select{
    font-family:inherit;font-size:16px;font-weight:700;padding:8px 10px;border-radius:12px;
    border:2px solid #e3e8ef;background:#fff;color:var(--ink);
  }
  .mini-btn{
    font-size:14px;font-weight:700;padding:9px 16px;border-radius:999px;
    background:var(--accent);color:#fff;
  }
  .mini-btn.alt{background:#fff;color:var(--muted);border:2px solid #e3e8ef;}
  .num.inrange{outline:3px solid var(--accent);outline-offset:-3px;}

  /* ---------- Grid overlay ---------- */
  #grid{
    display:none;position:fixed;inset:0;background:rgba(20,24,33,.55);z-index:20;
    align-items:flex-end;
  }
  #grid .sheet{
    background:var(--bg);width:100%;max-height:80%;border-radius:22px 22px 0 0;
    padding:18px 16px 28px;overflow-y:auto;
  }
  #grid .sheet h3{margin:4px 0 14px;text-align:center;color:var(--muted);font-size:15px;}
  .num-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .num{
    aspect-ratio:1/1;border-radius:14px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.06);
    font-weight:700;font-size:18px;color:var(--ink);display:flex;align-items:center;justify-content:center;
  }
  .num.cur{background:var(--accent);color:#fff;}
  @media(min-width:560px){.num-grid{grid-template-columns:repeat(8,1fr);}}
</style>
</head>
<body>

<!-- HOME -->
<section id="home">
  <h1>B.B. カード</h1>
  <p class="sub">セットをえらんでください<br>絵（英文）を見ながら、音声のあとに続けて言おう</p>
  <div class="set-grid" id="setGrid"></div>
</section>

<!-- PLAYER -->
<section id="player">
  <div class="topbar">
    <button class="back" id="backBtn" aria-label="戻る">‹</button>
    <div class="title" id="setTitle"></div>
    <button class="rangebtn pulse" id="rangeBtn">🔢 範囲をえらぶ</button>
    <button class="count" id="countBtn">1 / 32</button>
  </div>
  <div class="stage">
    <div class="card" id="card">
      <div class="badge" id="badge">♦1</div>
      <img class="pic" id="pic" alt="">
      <div class="en" id="enText"></div>
      <div class="jp" id="jpText"></div>
    </div>
  </div>
  <div class="controls">
    <div class="play-row">
      <button class="nav" id="prevBtn" aria-label="前へ">‹</button>
      <button class="play" id="playBtn" aria-label="再生">▶</button>
      <button class="nav" id="nextBtn" aria-label="次へ">›</button>
    </div>
    <div class="opts">
      <button class="chip on" id="autoChip">▶ 自動で次へ</button>
      <button class="chip speed-chip" id="speedChip">速さ ×1.0</button>
      <button class="chip" id="ansChip">答えを隠す</button>
    </div>
  </div>
</section>

<!-- GRID OVERLAY -->
<div id="grid">
  <div class="sheet">
    <h3>番号をタップ→ジャンプ ／ 範囲をえらんで「その週だけ」練習</h3>
    <div class="range-row">
      <span>範囲</span>
      <select id="fromSel"></select>
      <span>〜</span>
      <select id="toSel"></select>
      <button class="mini-btn" id="rangeApply">この範囲だけ練習</button>
      <button class="mini-btn alt" id="rangeAll">全部</button>
    </div>
    <div class="num-grid" id="numGrid"></div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>
<audio id="preloader" preload="auto"></audio>

<script src="data.js"></script>
<script>
(function(){
  const pad = c => String(c.n).padStart(2,'0');
  const audioUrl = c => `audio/${state.set.prefix}${pad(c)}.mp3`;
  const imgUrl   = c => `images/${state.set.prefix}${pad(c)}.jpg`;

  const el = {
    home: document.getElementById('home'),
    player: document.getElementById('player'),
    setGrid: document.getElementById('setGrid'),
    setTitle: document.getElementById('setTitle'),
    countBtn: document.getElementById('countBtn'),
    badge: document.getElementById('badge'),
    pic: document.getElementById('pic'),
    enText: document.getElementById('enText'),
    jpText: document.getElementById('jpText'),
    card: document.getElementById('card'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    playBtn: document.getElementById('playBtn'),
    autoChip: document.getElementById('autoChip'),
    speedChip: document.getElementById('speedChip'),
    ansChip: document.getElementById('ansChip'),
    backBtn: document.getElementById('backBtn'),
    grid: document.getElementById('grid'),
    rangeBtn: document.getElementById('rangeBtn'),
    numGrid: document.getElementById('numGrid'),
    fromSel: document.getElementById('fromSel'),
    toSel: document.getElementById('toSel'),
    rangeApply: document.getElementById('rangeApply'),
    rangeAll: document.getElementById('rangeAll'),
    audio: document.getElementById('audio'),
    preloader: document.getElementById('preloader'),
  };

  const speeds = [0.75, 1.0, 1.25];
  let state = { setKey:null, set:null, idx:0, auto:true, speedI:1, hideAns:false, from:0, to:0 };

  // ---- Build home ----
  const order = ['diamond','heart','clover','spade'];
  order.forEach(key=>{
    const s = SETS[key];
    const b = document.createElement('button');
    b.className = 'set-btn';
    b.style.color = s.color;
    b.innerHTML = `<span class="mk">${s.mark}</span><span class="nm">${s.name}</span>`;
    b.onclick = ()=>openSet(key);
    el.setGrid.appendChild(b);
  });

  function openSet(key){
    state.setKey = key;
    state.set = SETS[key];
    state.idx = 0;
    state.from = 0;
    state.to = state.set.cards.length-1;
    document.documentElement.style.setProperty('--accent', state.set.color);
    el.setTitle.textContent = state.set.name;
    el.home.style.display = 'none';
    el.player.style.display = 'flex';
    buildNumGrid();
    show(0, false);
  }

  function goHome(){
    el.audio.pause();
    el.player.style.display = 'none';
    el.home.style.display = 'flex';
  }

  function card(){ return state.set.cards[state.idx]; }

  function show(i, autoplay){
    state.idx = Math.max(0, Math.min(state.set.cards.length-1, i));
    const c = card();
    el.badge.textContent = `${state.set.mark}${c.n}`;
    el.pic.src = imgUrl(c);
    el.enText.textContent = c.en;
    el.jpText.textContent = c.jp;
    const ranged = !(state.from===0 && state.to===state.set.cards.length-1);
    el.countBtn.textContent = ranged
      ? `${state.set.mark}${c.n}（${state.set.cards[state.from].n}–${state.set.cards[state.to].n}）`
      : `${state.idx+1} / ${state.set.cards.length}`;
    el.prevBtn.disabled = state.idx<=state.from;
    el.nextBtn.disabled = state.idx>=state.to;
    // refresh number grid highlight
    [...el.numGrid.children].forEach((n,j)=>{
      n.classList.toggle('cur', j===state.idx);
      n.classList.toggle('inrange', ranged && j>=state.from && j<=state.to && j!==state.idx);
    });
    // load audio
    el.audio.src = audioUrl(c);
    el.audio.playbackRate = speeds[state.speedI];
    el.audio.load();
    if(autoplay) playCurrent();
    preloadNext();
  }

  function preloadNext(){
    const nx = state.set.cards[state.idx+1];
    if(nx){ el.preloader.src = audioUrl(nx); el.preloader.load(); new Image().src = imgUrl(nx); }
  }

  function playCurrent(){
    el.audio.playbackRate = speeds[state.speedI];
    el.audio.play().catch(()=>{});
  }

  function next(autoplay){ if(state.idx < state.to) show(state.idx+1, autoplay); }
  function prev(){ if(state.idx > state.from) show(state.idx-1, false); }

  // ---- Controls ----
  el.playBtn.onclick = ()=>{
    if(el.audio.paused) playCurrent(); else el.audio.pause();
  };
  el.prevBtn.onclick = ()=>prev();
  el.nextBtn.onclick = ()=>next(true);
  el.backBtn.onclick = goHome;

  el.audio.addEventListener('play', ()=> el.playBtn.textContent='❚❚');
  el.audio.addEventListener('pause', ()=> el.playBtn.textContent='▶');
  el.audio.addEventListener('ended', ()=>{
    el.playBtn.textContent='▶';
    if(state.auto) setTimeout(()=>next(true), 700);
  });

  el.autoChip.onclick = ()=>{
    state.auto = !state.auto;
    el.autoChip.classList.toggle('on', state.auto);
    el.autoChip.textContent = state.auto ? '▶ 自動で次へ' : '⏸ 自動オフ';
  };
  el.speedChip.onclick = ()=>{
    state.speedI = (state.speedI+1)%speeds.length;
    el.audio.playbackRate = speeds[state.speedI];
    el.speedChip.textContent = `速さ ×${speeds[state.speedI].toFixed(2).replace(/0$/,'')}`;
  };
  el.ansChip.onclick = ()=>{
    state.hideAns = !state.hideAns;
    el.card.classList.toggle('hide-answer', state.hideAns);
    el.ansChip.classList.toggle('on', state.hideAns);
    el.ansChip.textContent = state.hideAns ? '答えを表示' : '答えを隠す';
  };

  // ---- Number grid + range picker ----
  function buildNumGrid(){
    el.numGrid.innerHTML='';
    el.fromSel.innerHTML=''; el.toSel.innerHTML='';
    state.set.cards.forEach((c,j)=>{
      const n=document.createElement('button');
      n.className='num'; n.textContent=c.n;
      n.onclick=()=>{ state.from=0; state.to=state.set.cards.length-1; closeGrid(); show(j, true); };
      el.numGrid.appendChild(n);
      el.fromSel.appendChild(new Option(c.n, j));
      el.toSel.appendChild(new Option(c.n, j));
    });
  }
  function applyRange(){
    let f=parseInt(el.fromSel.value,10), t=parseInt(el.toSel.value,10);
    if(f>t){ const tmp=f; f=t; t=tmp; }
    state.from=f; state.to=t;
    closeGrid();
    show(f, true);
  }
  function clearRange(){
    state.from=0; state.to=state.set.cards.length-1;
    closeGrid();
    show(state.idx, false);
  }
  el.rangeApply.onclick = applyRange;
  el.rangeAll.onclick = clearRange;
  function openGrid(){
    // preselect current range in the dropdowns
    el.fromSel.value = state.from; el.toSel.value = state.to;
    el.grid.style.display='flex';
    el.rangeBtn.classList.remove('pulse'); // stop drawing attention once discovered
  }
  el.countBtn.onclick = openGrid;
  el.rangeBtn.onclick = openGrid;
  function closeGrid(){ el.grid.style.display='none'; }
  el.grid.onclick = (e)=>{ if(e.target===el.grid) closeGrid(); };

  // ---- Keyboard ----
  document.addEventListener('keydown', (e)=>{
    if(el.player.style.display==='none') return;
    if(e.key==='ArrowRight'){ next(true); e.preventDefault(); }
    else if(e.key==='ArrowLeft'){ prev(); e.preventDefault(); }
    else if(e.key===' '){ el.playBtn.click(); e.preventDefault(); }
    else if(e.key==='Escape'){ closeGrid(); }
  });

  // tap the card to play/pause too
  el.card.addEventListener('click', ()=> el.playBtn.click());
})();
</script>
</body>
</html>
